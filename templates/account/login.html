{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}
    Log in - Readditnews
{% endblock title %}
{% block content %}
    <h1>Log in</h1>
    <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit">Log in</button>
    </form>
    <p>
        Don't have an account? <a href="{% url 'account_signup' %}">Register</a>
    </p>
{% endblock %}
