<!DOCTYPE html>
<html>
<head>
    <title>Log in - Readditnews</title>
</head>
<body>
    <h1>Log in</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Log in</button>
    </form>
    <p>Don't have an account? <a href="{% url 'account_signup' %}">Register</a></p>
</body>
</html>
