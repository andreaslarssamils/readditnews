{% extends "base.html" %}
{% block content %}
    <div class="row">
        <div class="col-md-6 mx-auto">
            <h2 class="mb-4">Create Post</h2>
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary w-100">Post</button>
            </form>
        </div>
    </div>
{% endblock content %}
{% block extra_js %}
    {{ form.media }}
{% endblock extra_js %}
